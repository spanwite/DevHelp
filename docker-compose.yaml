services:
  postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0
    restart: on-failure
    env_file:
      - .env.local
    volumes:
      - ./secrets/postgresql-data:/var/lib/postgresql/data

  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2.7.0
    restart: on-failure
    ports:
      - 27017:27017
    env_file:
      - .env.local

networks:
  default:
    name: ferretdb
